name: Feature request
description: Propose a focused improvement aligned with BAR's roadmap.
title: "feature: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the concrete user or operator problem.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Keep the proposal focused; include relevant specification sections when known.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or examples
      description: Links, examples, or constraints that support the request.
